    <line x1="30" y1="85" x2="15" y2="85"/>
    <line x1="1185" y1="70" x2="1170" y2="70"/>
    <!-- Central America - Venezuela -->
    <line x1="142" y1="325" x2="185" y2="340"/>
    <!-- Brazil - North Africa -->
    <line x1="320" y1="420" x2="400" y2="340"/>
    <!-- Greenland - Iceland -->
